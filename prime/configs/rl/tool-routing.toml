model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 200
batch_size = 128
rollouts_per_example = 64
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 128

[sampling]
max_tokens = 1024

[[env]]
id = "salesbench/tool-routing"

env_file = ["../.env"]

[wandb]
project = "tool-routing"
name = "e351-lora128-filter-64r"

[eval]
interval = 50
eval_base_model = true

[[eval.env]]
id = "salesbench/tool-routing"
num_examples = 50
rollouts_per_example = 4

[val]
num_examples = 32
rollouts_per_example = 1
interval = 5

[buffer]
online_difficulty_filtering = true
easy_threshold = 0.9
hard_threshold = 0.1
easy_fraction = 0.0
hard_fraction = 0.0

[checkpoints]
interval = 100
keep_cloud = 5
